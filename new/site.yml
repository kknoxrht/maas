site:
  title: "Red Hat OpenShift AI - Models as a Service Enablement"
  start_page: modules::index.adoc

content:
  sources:
  - url: .
    start_path: content

ui:
  bundle:
    url: https://github.com/rhpds/rhdp_showroom_theme/releases/download/rh-one-2025/ui-bundle.zip
    snapshot: true
  supplemental_files:
    - path: ./content/supplemental-ui
    - path: ./content/lib
    - path: .nojekyll
    - path: ui.yml
      contents: "static_files: [ .nojekyll ]"

antora:
  extensions:
  - require: ./content/lib/dev-mode.js
    enabled: false

output:
  dir: ./www
